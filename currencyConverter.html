<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="currencyConverter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
            <div id="amount">
            <p>Enter Amount</p>
            <input value="1" type="number">
            </div>
            <div id="dropdown">
                <div id="from"><p>From</p>
                    <div class="select-container">
                    <img src="https://flagsapi.com/US/flat/64.png">
                    <select name="from" id="from-country">
                        
                    </select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <div id="to"><p>To</p>
                    <div class="select-container">
                    <img src="https://flagsapi.com/IN/flat/64.png">
                    <select name="to" id="to-country">

                    </select>
                    </div>
                </div>
            </div>
            <div id="exchange-result">

            </div>
            <button>Get Exchange Rate</button>
        </form>
    </div>
    <script src="codes.js"></script>
    <script src="currencyConverter.js"></script>
</body>
</html>
